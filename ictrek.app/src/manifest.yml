id: com.ictrek.hybrag
name:
  zh-CN: HybRAG
  en: HybRAG
description:
  zh-CN: 企业知识库、RAG 问答、Wiki 知识图谱与智能体平台，默认复用 Model Hub 预热的 QA、图片理解和 embedding 后端。
  en: Enterprise knowledge-base, RAG, Wiki graph, and agent platform using Model Hub
    prewarmed QA, vision, and embedding backends by default.
version: __APP_VERSION__
author: ictrek
category:
- ai
arch:
- amd64
- arm64
platform:
  version: '>=3.0.0'
dependencies:
  apps:
  - id: com.ictrek.model-hub
    version: '>=0.0.54'
    optional: false
  - id: com.ictrek.pgv
    version: '>=0.0.21'
    optional: false
profiles:
- name: amd
  title:
    zh-CN: AMD64
    en: AMD64
  description:
    zh-CN: 使用 AMD_with_cuda 飞书标签页中的 HybRAG 镜像。
    en: Use HybRAG images from the AMD_with_cuda Feishu sheet.
  conflicts:
  - arm
- name: arm
  title:
    zh-CN: ARM64
    en: ARM64
  description:
    zh-CN: 使用 ARM_with_cuda 飞书标签页中的 HybRAG 镜像。
    en: Use HybRAG images from the ARM_with_cuda Feishu sheet.
  conflicts:
  - amd
storage:
  directories:
  - path: files
    mode: '0755'
  - path: docreader
    mode: '0755'
  - path: redis
    mode: '0755'
