configs:
  - name: MODEL_HUB_SHARED_MODELS_PATH
    type: path
    title:
      zh-CN: Model Hub 共享模型目录
      en: Model Hub Shared Models Path
    description:
      zh-CN: Model Hub VOS 应用管理的宿主机模型根目录。HybRAG 的两个 Ollama 容器会复用其中的 ollama 模型目录，并允许 HybRAG 触发 ollama pull 写入模型。
      en: Host-side model root managed by the Model Hub VOS app. Both HybRAG Ollama containers reuse its ollama model directory and may write models when HybRAG triggers ollama pull.
    default: /data/vos_workspace/model_hub
  - name: HYBRAG_WORKSPACE_PATH
    type: path
    title:
      zh-CN: HybRAG 工作目录
      en: HybRAG Workspace Path
    description:
      zh-CN: HybRAG 独立持久化根目录。默认只作为安装 UI 中的路径约定提示；如需整体迁移目录，请同步调整下方 files/docreader/redis 路径。
      en: Host-side persistence root for HybRAG. This is a UI-level convention; if you move the root, also update the files/docreader/redis paths below.
    default: /data/vos_workspace/hybrag
  - name: HYBRAG_FILES_PATH
    type: path
    title:
      zh-CN: 文档原文目录
      en: Uploaded Files Path
    description:
      zh-CN: 映射到 App 容器 `/data/files`，保存上传文档、知识库原文和本地存储文件。
      en: Mounted to `/data/files` in the app container for uploaded documents and local storage files.
    default: /data/vos_workspace/hybrag/files
  - name: HYBRAG_DOCREADER_PATH
    type: path
    title:
      zh-CN: 文档解析中间文件目录
      en: DocReader Working Path
    description:
      zh-CN: 映射到 DocReader `/tmp/docreader`，并只读挂载给 App，用于 PDF 渲染图片等解析中间产物。
      en: Mounted to DocReader `/tmp/docreader` and read-only into App for parse intermediates such as rendered PDF images.
    default: /data/vos_workspace/hybrag/docreader
  - name: HYBRAG_REDIS_PATH
    type: path
    title:
      zh-CN: Redis 数据目录
      en: Redis Data Path
    description:
      zh-CN: 映射到 Redis `/data`，保存 AOF 等 Redis 持久化数据。
      en: Mounted to Redis `/data` for AOF and Redis persistence.
    default: /data/vos_workspace/hybrag/redis
  - name: HYBRAG_DOCKER_SOCKET_PATH
    type: path
    title:
      zh-CN: Docker Socket 路径
      en: Docker Socket Path
    description:
      zh-CN: 映射到 App 容器 `/var/run/docker.sock`，用于 docker sandbox 模式。生产环境应确认该授权边界可接受。
      en: Mounted to app `/var/run/docker.sock` for docker sandbox mode. Confirm this trust boundary before production use.
    default: /var/run/docker.sock
  - name: WEKNORA_DB_HOST
    type: string
    title:
      zh-CN: PGV/Postgres 服务地址
      en: PGV/Postgres Host
    description:
      zh-CN: HybRAG 连接的 Postgres 服务名。默认使用 PGV 在 `vos_default` 网络中的稳定别名 `shared-pgv`。
      en: Postgres service host used by HybRAG. Defaults to PGV's stable `shared-pgv` alias on `vos_default`.
    default: shared-pgv
  - name: WEKNORA_DB_PORT
    type: integer
    title:
      zh-CN: PGV/Postgres 端口
      en: PGV/Postgres Port
    description:
      zh-CN: 容器网络内的 Postgres 端口。PGV 默认内部端口为 5432，即使宿主机调试端口改成 25432 也不影响这里。
      en: In-network Postgres port. PGV defaults to container port 5432 even when the host debug port is changed to 25432.
    default: 5432
    minimum: 1
    maximum: 65535
  - name: WEKNORA_DB_USER
    type: string
    title:
      zh-CN: HybRAG 数据库用户
      en: HybRAG Database User
    description:
      zh-CN: PGV 默认预置的 WeKnora 用户为 `weknora`。如果安装 PGV 时改过用户，请在这里同步修改。
      en: PGV precreates `weknora` by default. Change this if PGV was installed with a different user.
    default: weknora
  - name: WEKNORA_DB_PASSWORD
    type: password
    title:
      zh-CN: HybRAG 数据库密码
      en: HybRAG Database Password
    description:
      zh-CN: PGV 默认预置的 WeKnora 密码为 `weknora`。如果安装 PGV 时改过密码，请在这里同步修改。
      en: PGV precreates password `weknora` by default. Change this if PGV was installed with a different password.
    default: weknora
  - name: WEKNORA_DB_NAME
    type: string
    title:
      zh-CN: HybRAG 数据库名
      en: HybRAG Database Name
    description:
      zh-CN: PGV 默认预置的 WeKnora 数据库为 `WeKnora`。如果安装 PGV 时改过数据库名，请在这里同步修改。
      en: PGV precreates database `WeKnora` by default. Change this if PGV was installed with a different database name.
    default: WeKnora
  - name: OLLAMA_QA_MODEL
    type: string
    title:
      zh-CN: QA/VLM 模型
      en: QA/VLM Model
    description:
      zh-CN: 需要预先在 QA Ollama 容器中存在的聊天和图片理解模型名。
      en: Chat and vision model name expected to exist in the QA Ollama container.
    default: qwen3.5:2b
  - name: OLLAMA_EMBEDDING_MODEL
    type: string
    title:
      zh-CN: Embedding 模型
      en: Embedding Model
    description:
      zh-CN: 需要预先在 embedding Ollama 容器中存在的多语言 embedding 模型名。
      en: Multilingual embedding model name expected to exist in the embedding Ollama container.
    default: bge-m3:latest
  - name: OLLAMA_CONTEXT_LENGTH
    type: integer
    title:
      zh-CN: Ollama QA 上下文长度
      en: Ollama QA Context Length
    description:
      zh-CN: QA/VLM Ollama 容器的默认上下文长度。
      en: Default context length for the QA/VLM Ollama container.
    default: 24000
    minimum: 1024
    maximum: 131072
  - name: OLLAMA_QA_NUM_PARALLEL
    type: integer
    title:
      zh-CN: QA/VLM Ollama 并发
      en: QA/VLM Ollama Parallelism
    description:
      zh-CN: QA/VLM Ollama 实例的 OLLAMA_NUM_PARALLEL。
      en: OLLAMA_NUM_PARALLEL for the QA/VLM Ollama instance.
    default: 8
    minimum: 1
    maximum: 32
  - name: OLLAMA_EMBEDDING_NUM_PARALLEL
    type: integer
    title:
      zh-CN: Embedding Ollama 并发
      en: Embedding Ollama Parallelism
    description:
      zh-CN: Embedding Ollama 实例的 OLLAMA_NUM_PARALLEL。
      en: OLLAMA_NUM_PARALLEL for the embedding Ollama instance.
    default: 4
    minimum: 1
    maximum: 32
  - name: OLLAMA_EMBEDDING_CONTEXT_LENGTH
    type: integer
    title:
      zh-CN: Embedding Ollama 上下文长度
      en: Embedding Ollama Context Length
    description:
      zh-CN: Embedding Ollama 容器的上下文长度。默认 8192，通常不需要与 QA 容器保持一致。
      en: Context length for the embedding Ollama container. Defaults to 8192 and usually does not need to match the QA container.
    default: 8192
    minimum: 1024
    maximum: 32768
  - name: OLLAMA_KEEP_ALIVE
    type: string
    title:
      zh-CN: Ollama 模型常驻时间
      en: Ollama Keep Alive
    description:
      zh-CN: 传给两个 Ollama 容器的 OLLAMA_KEEP_ALIVE。默认 `-1` 表示模型常驻，避免 HybRAG 调用前反复加载。
      en: OLLAMA_KEEP_ALIVE for both Ollama containers. Default `-1` keeps models loaded.
    default: "-1"
  - name: WEKNORA_CHAT_RESERVED_CONCURRENCY
    type: integer
    title:
      zh-CN: 聊天预留并发
      en: Chat Reserved Concurrency
    description:
      zh-CN: 为在线聊天预留的主模型槽位，后台 Graph/Wiki/VLM/摘要任务不会占满所有 QA/VLM 并发。
      en: Main-model slots reserved for interactive chat.
    default: 2
    minimum: 1
    maximum: 16
  - name: WEKNORA_MAIN_QA_MODEL_CONCURRENCY
    type: integer
    title:
      zh-CN: QA/VLM 总槽位
      en: QA/VLM Total Slots
    description:
      zh-CN: 应用侧认为 QA/VLM 模型服务可承载的总槽位。非 thor profile 默认 8，其中 2 个留给在线聊天，后台任务共享 6 个。
      en: App-side total capacity for the QA/VLM model backend. Non-thor profiles default to 8, with 2 reserved for chat and 6 shared by background tasks.
    default: 8
    minimum: 1
    maximum: 32
  - name: WEKNORA_MODEL_MAX_CONCURRENCY
    type: integer
    title:
      zh-CN: 后台模型共享槽位
      en: Background Model Slots
    description:
      zh-CN: 同一模型 endpoint 的后台 Chat/VLM/Graph/Wiki/摘要任务共享上限。非 thor profile 默认 6。
      en: Shared background cap for one model endpoint across Chat, VLM, Graph, Wiki, and summary tasks. Non-thor profiles default to 6.
    default: 6
    minimum: 0
    maximum: 32
  - name: CONCURRENCY_POOL_SIZE
    type: integer
    title:
      zh-CN: 文档 Embedding 后台槽位
      en: Document Embedding Slots
    description:
      zh-CN: 应用侧文档 embedding 并发。Embedding Ollama 总槽位默认为 4，本项默认 2，另外 2 个留给聊天检索。
      en: App-side document embedding concurrency. Embedding Ollama defaults to 4 total slots; this defaults to 2 so 2 slots remain for chat retrieval.
    default: 2
    minimum: 1
    maximum: 32
  - name: WEKNORA_CHAT_MODEL_CONTEXT_TOKENS
    type: integer
    title:
      zh-CN: QA 上下文总窗口
      en: QA Context Window
    description:
      zh-CN: 应用侧用于裁剪 RAG/工具上下文的 QA 总上下文。非 thor profile 默认 24000。
      en: App-side QA context window used to trim RAG/tool context. Non-thor profiles default to 24000.
    default: 24000
    minimum: 1024
    maximum: 131072
  - name: WEKNORA_CHAT_CONTEXT_SAFETY_TOKENS
    type: integer
    title:
      zh-CN: QA 上下文安全余量
      en: QA Context Safety Tokens
    description:
      zh-CN: 从总上下文中额外预留的安全 token。默认 0，使 24000 总窗口按 16000 输入和 8000 输出预算分配。
      en: Extra safety tokens reserved from the total context. Default 0 so a 24000 window maps to about 16000 input plus 8000 output.
    default: 0
    minimum: 0
    maximum: 8192
  - name: WEKNORA_AGENT_FINAL_ANSWER_MAX_TOKENS
    type: integer
    title:
      zh-CN: 智能体最终输出上限
      en: Agent Final Answer Max Tokens
    description:
      zh-CN: 智能体最终答案最大输出 token。非 thor profile 默认 8000。
      en: Max output tokens for agent final answers. Non-thor profiles default to 8000.
    default: 8000
    minimum: 512
    maximum: 32768
  - name: WEKNORA_CONVERSATION_MAX_COMPLETION_TOKENS
    type: integer
    title:
      zh-CN: 普通问答输出上限
      en: Conversation Max Completion Tokens
    description:
      zh-CN: 普通知识库问答和会话摘要的最大输出 token。非 thor profile 默认 8000。
      en: Max output tokens for regular knowledge-base chat and conversation summaries. Non-thor profiles default to 8000.
    default: 8000
    minimum: 512
    maximum: 32768
  - name: BATCH_EMBED_SIZE
    type: integer
    title:
      zh-CN: Embedding 批量大小
      en: Embedding Batch Size
    description:
      zh-CN: 文档 embedding 批量大小。普通 profile 默认 4；显存紧张时可降低。
      en: Batch size for document embedding. Non-thor profiles default to 4; lower it when memory is constrained.
    default: 4
    minimum: 1
    maximum: 64
  - name: WEKNORA_ASYNQ_CORE_CONCURRENCY
    type: integer
    title:
      zh-CN: 核心任务 Worker
      en: Core Worker Concurrency
    description:
      zh-CN: 核心异步任务 worker 并发。上游要求除 shared 外的池至少为 1。
      en: Core async worker concurrency. Upstream requires pools other than shared to be at least 1.
    default: 1
    minimum: 1
    maximum: 32
  - name: WEKNORA_ASYNQ_POSTPROCESS_CONCURRENCY
    type: integer
    title:
      zh-CN: 后处理 Worker
      en: Postprocess Worker Concurrency
    description:
      zh-CN: 文档后处理任务 worker 并发。
      en: Worker concurrency for postprocess tasks.
    default: 1
    minimum: 1
    maximum: 32
  - name: WEKNORA_ASYNQ_ENRICHMENT_CONCURRENCY
    type: integer
    title:
      zh-CN: 增强任务 Worker
      en: Enrichment Worker Concurrency
    description:
      zh-CN: 实体抽取、问题生成、摘要等增强任务 worker 并发。
      en: Worker concurrency for enrichment tasks such as entity extraction, question generation, and summaries.
    default: 1
    minimum: 1
    maximum: 32
  - name: WEKNORA_ASYNQ_MAINTENANCE_CONCURRENCY
    type: integer
    title:
      zh-CN: 维护任务 Worker
      en: Maintenance Worker Concurrency
    description:
      zh-CN: 清理、重试、维护类任务 worker 并发。
      en: Worker concurrency for cleanup, retry, and maintenance tasks.
    default: 1
    minimum: 1
    maximum: 32
  - name: WEKNORA_ASYNQ_SHARED_CONCURRENCY
    type: integer
    title:
      zh-CN: 共享 Worker
      en: Shared Worker Concurrency
    description:
      zh-CN: 弹性共享 worker 池。允许为 0；thor 默认关闭该池。
      en: Elastic shared worker pool. May be 0; thor disables it by default.
    default: 1
    minimum: 0
    maximum: 32
  - name: WEKNORA_WIKI_ASYNQ_CONCURRENCY
    type: integer
    title:
      zh-CN: Wiki 任务 Worker
      en: Wiki Worker Concurrency
    description:
      zh-CN: Wiki 生成与图谱相关异步任务 worker 并发。
      en: Worker concurrency for wiki generation and graph-related async tasks.
    default: 1
    minimum: 1
    maximum: 32
  - name: WEKNORA_GRAPH_LLM_CONCURRENCY
    type: integer
    title:
      zh-CN: Graph LLM 并发
      en: Graph LLM Concurrency
    description:
      zh-CN: GraphRAG 实体关系抽取等图相关 LLM 调用并发。
      en: LLM concurrency for graph-related work such as entity and relation extraction.
    default: 1
    minimum: 1
    maximum: 32
  - name: WEKNORA_WIKI_INGEST_MAP_PARALLEL
    type: integer
    title:
      zh-CN: Wiki Map 并发
      en: Wiki Map Parallelism
    description:
      zh-CN: Wiki ingest map 阶段并发。
      en: Parallelism for the wiki ingest map stage.
    default: 1
    minimum: 1
    maximum: 32
  - name: WEKNORA_WIKI_INGEST_REDUCE_PARALLEL
    type: integer
    title:
      zh-CN: Wiki Reduce 并发
      en: Wiki Reduce Parallelism
    description:
      zh-CN: Wiki ingest reduce 阶段并发。
      en: Parallelism for the wiki ingest reduce stage.
    default: 1
    minimum: 1
    maximum: 32
  - name: MAX_FILE_SIZE_MB
    type: integer
    title:
      zh-CN: 最大上传文件 MB
      en: Max Upload File MB
    description:
      zh-CN: 前端、App 和 DocReader 共用的单文件大小上限。
      en: Per-file upload limit shared by frontend, app, and DocReader.
    default: 500
    minimum: 1
    maximum: 10240
  - name: DOCREADER_ODL_MAX_WORKERS
    type: integer
    title:
      zh-CN: Docling Worker
      en: Docling Workers
    description:
      zh-CN: DocReader 中 Docling/ODL 解析 worker 数。
      en: Docling/ODL worker count in DocReader.
    default: 1
    minimum: 1
    maximum: 16
  - name: DOCREADER_MARKITDOWN_MAX_WORKERS
    type: integer
    title:
      zh-CN: MarkItDown Worker
      en: MarkItDown Workers
    description:
      zh-CN: DocReader 中 MarkItDown 解析 worker 数。
      en: MarkItDown worker count in DocReader.
    default: 1
    minimum: 1
    maximum: 16
  - name: DOCREADER_PDF_RENDER_MAX_WORKERS
    type: integer
    title:
      zh-CN: PDF 渲染 Worker
      en: PDF Render Workers
    description:
      zh-CN: PDF 页面转图 worker 数，主要影响图片描述/VLM 解析前处理。
      en: PDF-to-image worker count, mainly affecting VLM parse preprocessing.
    default: 1
    minimum: 1
    maximum: 16
  - name: DOCREADER_PDF_RENDER_DPI
    type: integer
    title:
      zh-CN: PDF 渲染 DPI
      en: PDF Render DPI
    description:
      zh-CN: PDF 页面转图 DPI。提高会增加解析质量和资源消耗。
      en: DPI for PDF page rendering. Higher values improve quality but consume more resources.
    default: 200
    minimum: 72
    maximum: 400
  - name: DOCREADER_PDF_JPEG_QUALITY
    type: integer
    title:
      zh-CN: PDF 图片 JPEG 质量
      en: PDF JPEG Quality
    description:
      zh-CN: PDF 渲染图片的 JPEG 质量。
      en: JPEG quality for rendered PDF images.
    default: 90
    minimum: 30
    maximum: 100
  - name: OLLAMA_QA_NUM_PARALLEL_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor QA/VLM Ollama 并发
      en: Thor QA/VLM Ollama Parallelism
    description:
      zh-CN: thor_spark profile 的 QA/VLM Ollama 总槽位。
      en: QA/VLM Ollama total slots for the thor_spark profile.
    default: 20
    minimum: 1
    maximum: 64
  - name: OLLAMA_CONTEXT_LENGTH_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor QA 上下文长度
      en: Thor QA Context Length
    description:
      zh-CN: thor_spark profile 的 QA/VLM Ollama 上下文长度。
      en: QA/VLM Ollama context length for the thor_spark profile.
    default: 65536
    minimum: 1024
    maximum: 131072
  - name: OLLAMA_EMBEDDING_NUM_PARALLEL_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor Embedding Ollama 并发
      en: Thor Embedding Ollama Parallelism
    description:
      zh-CN: thor_spark profile 的 embedding Ollama 总槽位。
      en: Embedding Ollama total slots for the thor_spark profile.
    default: 16
    minimum: 1
    maximum: 64
  - name: WEKNORA_CHAT_RESERVED_CONCURRENCY_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor 聊天预留并发
      en: Thor Chat Reserved Concurrency
    description:
      zh-CN: thor_spark profile 为在线聊天预留的主模型槽位。
      en: Main-model slots reserved for chat in the thor_spark profile.
    default: 6
    minimum: 1
    maximum: 32
  - name: WEKNORA_MAIN_QA_MODEL_CONCURRENCY_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor QA/VLM 总槽位
      en: Thor QA/VLM Total Slots
    description:
      zh-CN: thor_spark profile 的应用侧 QA/VLM 总槽位。
      en: App-side QA/VLM total capacity for the thor_spark profile.
    default: 20
    minimum: 1
    maximum: 64
  - name: WEKNORA_MODEL_MAX_CONCURRENCY_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor 后台模型共享槽位
      en: Thor Background Model Slots
    description:
      zh-CN: thor_spark profile 的后台主模型共享槽位。
      en: Background main-model shared slots for the thor_spark profile.
    default: 14
    minimum: 0
    maximum: 64
  - name: WEKNORA_GRAPH_LLM_CONCURRENCY_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor Graph LLM 并发
      en: Thor Graph LLM Concurrency
    description:
      zh-CN: thor_spark profile 的 GraphRAG 图相关 LLM 调用并发。
      en: Graph-related LLM concurrency for the thor_spark profile.
    default: 2
    minimum: 1
    maximum: 32
  - name: WEKNORA_ASYNQ_CORE_CONCURRENCY_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor 核心任务 Worker
      en: Thor Core Worker Concurrency
    description:
      zh-CN: thor_spark profile 的核心异步任务 worker 并发。
      en: Core async worker concurrency for the thor_spark profile.
    default: 4
    minimum: 1
    maximum: 32
  - name: WEKNORA_ASYNQ_POSTPROCESS_CONCURRENCY_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor 后处理 Worker
      en: Thor Postprocess Worker Concurrency
    description:
      zh-CN: thor_spark profile 的文档后处理 worker 并发。
      en: Postprocess worker concurrency for the thor_spark profile.
    default: 2
    minimum: 1
    maximum: 32
  - name: WEKNORA_ASYNQ_ENRICHMENT_CONCURRENCY_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor 增强任务 Worker
      en: Thor Enrichment Worker Concurrency
    description:
      zh-CN: thor_spark profile 的实体抽取、问题生成、摘要等增强任务 worker 并发。
      en: Enrichment worker concurrency for the thor_spark profile.
    default: 2
    minimum: 1
    maximum: 32
  - name: WEKNORA_ASYNQ_MAINTENANCE_CONCURRENCY_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor 维护任务 Worker
      en: Thor Maintenance Worker Concurrency
    description:
      zh-CN: thor_spark profile 的维护类任务 worker 并发。
      en: Maintenance worker concurrency for the thor_spark profile.
    default: 1
    minimum: 1
    maximum: 32
  - name: WEKNORA_ASYNQ_SHARED_CONCURRENCY_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor 共享 Worker
      en: Thor Shared Worker Concurrency
    description:
      zh-CN: thor_spark profile 的弹性共享 worker 池。默认 0 表示关闭。
      en: Shared worker pool for the thor_spark profile. Default 0 disables it.
    default: 0
    minimum: 0
    maximum: 32
  - name: WEKNORA_WIKI_ASYNQ_CONCURRENCY_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor Wiki 任务 Worker
      en: Thor Wiki Worker Concurrency
    description:
      zh-CN: thor_spark profile 的 Wiki 生成与图谱相关异步任务 worker 并发。
      en: Wiki and graph async worker concurrency for the thor_spark profile.
    default: 4
    minimum: 1
    maximum: 32
  - name: WEKNORA_WIKI_INGEST_MAP_PARALLEL_THOR_SPARK
    type: integer
    title:
      zh-CN: Thor Wiki Map 并发
      en: Thor Wiki Map Parallelism
    description:
