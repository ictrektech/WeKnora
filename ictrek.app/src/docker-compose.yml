x-hybrag-ollama-qa-base: &hybrag-ollama-qa-base
  restart: unless-stopped
  runtime: nvidia
  networks:
    vos_default:
      aliases:
        - hybrag-ollama-qa
  entrypoint: ["/bin/sh", "-lc"]
  command:
    - ollama serve >/tmp/ollama.log 2>&1 & exec uvicorn ollama_gateway.gateway:app --host 0.0.0.0 --port 11535
  environment: *hybrag-ollama-qa-env
  volumes:
    - ${MODEL_HUB_SHARED_MODELS_PATH:-/data/vos_workspace/model_hub}/ollama:/root/.ollama
  healthcheck:
    test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 60s

