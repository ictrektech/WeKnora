    - CMD-SHELL
    - auth="$${NEO4J_AUTH:-neo4j/hybrag-neo4j}"; cypher-shell -u "$${auth%%/*}" -p
      "$${auth#*/}" 'RETURN 1;' >/dev/null 2>&1
