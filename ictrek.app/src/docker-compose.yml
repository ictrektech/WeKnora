    pull_policy: always
    environment:
      <<: *hybrag-app-env
      WEKNORA_SANDBOX_DOCKER_IMAGE: ${WEKNORA_SANDBOX_AMD_IMAGE}
    depends_on:
      hybrag-redis:
        condition: service_started
      hybrag-docreader-amd-with-cuda:
