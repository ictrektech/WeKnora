x-hybrag-ollama-qa-command: &hybrag-ollama-qa-command
  - |
    set -eu
    MODEL="$${OLLAMA_QA_MODEL:-qwen3.5:2b}"
    KEEP_ALIVE="$${OLLAMA_KEEP_ALIVE:--1m}"
    READY_WAIT="$${OLLAMA_READY_WAIT_SECONDS:-300}"
    MODEL_HUB_URL="$${MODEL_HUB_BACKEND_URL:-http://model-hub-backend:5005}"
    ollama serve >/tmp/ollama.log 2>&1 &
    i=0
    until ollama list >/dev/null 2>&1; do
      i=$$((i + 1))
      if [ "$$i" -ge "$$READY_WAIT" ]; then
        echo "ollama did not become ready within $${READY_WAIT}s" >&2
        exit 1
      fi
      sleep 1
    done
    PYTHON_BIN="$$(command -v python3 || command -v python)"
    if "$$PYTHON_BIN" - "$$MODEL_HUB_URL" "$$MODEL" <<'PY'
    import json
    import sys
    import time
    import urllib.error
    import urllib.request

    base = sys.argv[1].rstrip("/")
    model = sys.argv[2]
    payload = {"model_id": f"ollama://{model}", "source": "ollama", "name": model}

    def request(method, path, body=None, timeout=10):
        data = None if body is None else json.dumps(body).encode("utf-8")
        req = urllib.request.Request(
            base + path,
            data=data,
            method=method,
            headers={"Content-Type": "application/json"},
        )
        with urllib.request.urlopen(req, timeout=timeout) as resp:
            raw = resp.read().decode("utf-8")
            return json.loads(raw) if raw else {}

    try:
        result = request("POST", "/api/v1/models/pull", payload)
        task_id = result.get("task_id")
        print(f"model-hub pull task started for {model}: {task_id}")
    except urllib.error.HTTPError as exc:
        if exc.code == 409:
            print(f"model-hub already has or is pulling {model}")
            sys.exit(0)
        print(f"model-hub pull request failed for {model}: HTTP {exc.code}", file=sys.stderr)
        sys.exit(1)
    except Exception as exc:
        print(f"model-hub is unavailable for {model}: {exc}", file=sys.stderr)
        sys.exit(1)

    if not task_id:
        sys.exit(0)
    deadline = time.monotonic() + 3600
    while time.monotonic() < deadline:
        task = request("GET", f"/api/v1/tasks/detail/{task_id}", timeout=10)
        phase = str(task.get("phase", ""))
        if phase == "READY":
            print(f"model-hub pull ready for {model}")
            sys.exit(0)
        if phase == "FAILED":
            print(f"model-hub pull failed for {model}: {task.get('error_msg')}", file=sys.stderr)
            sys.exit(1)
        time.sleep(5)
    print(f"model-hub pull timed out for {model}", file=sys.stderr)
    sys.exit(1)
    PY
    then
      echo "model-hub ensured $${MODEL}"
    else
      echo "fall back to local ollama pull for $${MODEL}" >&2
      ollama pull "$$MODEL"
    fi
    if ollama show "$$MODEL" >/dev/null 2>&1; then
      echo "ollama already has $${MODEL}"
    else
      ollama pull "$$MODEL"
    fi
    "$$PYTHON_BIN" - "$$MODEL" "$$KEEP_ALIVE" <<'PY'
    import json
    import sys
    import urllib.request

    model, keep_alive = sys.argv[1], sys.argv[2]
    payload = {
        "model": model,
        "prompt": "HybRAG warmup",
        "stream": False,
        "keep_alive": keep_alive,
        "options": {"num_predict": 1},
    }
    req = urllib.request.Request(
        "http://127.0.0.1:11434/api/generate",
        data=json.dumps(payload).encode("utf-8"),
        method="POST",
        headers={"Content-Type": "application/json"},
    )
    try:
        with urllib.request.urlopen(req, timeout=600) as resp:
            resp.read()
    except urllib.error.HTTPError as exc:
        body = exc.read().decode("utf-8", errors="replace")
        print(f"ollama QA warmup failed for {model}: HTTP {exc.code} {body}", file=sys.stderr)
        raise
    except Exception as exc:
        print(f"ollama QA warmup failed for {model}: {exc}", file=sys.stderr)
        raise
    print(f"ollama QA model resident: {model}")
    PY
    exec uvicorn ollama_gateway.gateway:app --host 0.0.0.0 --port 11535

