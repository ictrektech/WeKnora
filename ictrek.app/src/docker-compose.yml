x-hybrag-frontend-base: &hybrag-frontend-base
  restart: unless-stopped
  networks:
  - vos_default
  environment:
    MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-500}
    APP_HOST: hybrag-app
    APP_PORT: 8080
    APP_SCHEME: http
  labels:
  - "traefik.enable=true"
  - "traefik.docker.network=vos_default"
  - "traefik.http.routers.hybrag-top-open.rule=PathPrefix(`/app/com.ictrek.hybrag`) && HeadersRegexp(`Sec-Fetch-Dest`, `document`)"
  - "traefik.http.routers.hybrag-top-open.priority=1000"
  - "traefik.http.routers.hybrag-top-open.service=hybrag-web"
  - "traefik.http.routers.hybrag-top-open.middlewares=hybrag-top-open-redirect"
  - "traefik.http.middlewares.hybrag-top-open-redirect.redirectregex.regex=^(https?://[^/]+)/app/com\\.ictrek\\.hybrag/?(?:\\\
    ?.*)?$"
  - "traefik.http.middlewares.hybrag-top-open-redirect.redirectregex.replacement=$${1}/#/app/com.ictrek.hybrag/com-ictrek-hybrag/hybrag"
  - "traefik.http.middlewares.hybrag-top-open-redirect.redirectregex.permanent=false"
  - "traefik.http.routers.hybrag-web.rule=PathPrefix(`/app/com.ictrek.hybrag`)"
  - "traefik.http.routers.hybrag-web.service=hybrag-web"
  - "traefik.http.routers.hybrag-web.middlewares=hybrag-web-slash,hybrag-web-strip"
  - "traefik.http.middlewares.hybrag-web-slash.redirectregex.regex=^(.*)/app/com\\.ictrek\\.hybrag$"
  - "traefik.http.middlewares.hybrag-web-slash.redirectregex.replacement=$${1}/app/com.ictrek.hybrag/"
  - "traefik.http.middlewares.hybrag-web-slash.redirectregex.permanent=true"
  - "traefik.http.middlewares.hybrag-web-strip.stripprefix.prefixes=/app/com.ictrek.hybrag"
  - "traefik.http.services.hybrag-web.loadbalancer.server.port=80"

x-hybrag-docreader-base: &hybrag-docreader-base
  restart: unless-stopped
  networks:
    vos_default:
      aliases:
      - hybrag-docreader
  expose:
  - "50051"
  environment:
    DOCREADER_IMAGE_OUTPUT_DIR: /tmp/docreader
    DOCREADER_PDF_FORCE_SCANNED: ${DOCREADER_PDF_FORCE_SCANNED:-false}
    MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-500}
    DOCREADER_ODL_MAX_WORKERS: ${DOCREADER_ODL_MAX_WORKERS:-1}
    DOCREADER_ODL_HYBRID: ${DOCREADER_ODL_HYBRID:-off}
    DOCREADER_MARKITDOWN_MAX_WORKERS: ${DOCREADER_MARKITDOWN_MAX_WORKERS:-1}
    DOCREADER_PDF_RENDER_MAX_WORKERS: ${DOCREADER_PDF_RENDER_MAX_WORKERS:-1}
    DOCREADER_PDF_RENDER_DPI: ${DOCREADER_PDF_RENDER_DPI:-200}
    DOCREADER_PDF_JPEG_QUALITY: ${DOCREADER_PDF_JPEG_QUALITY:-90}
    GRPC_TLS_ENABLED: ${GRPC_TLS_ENABLED:-false}
    GRPC_AUTH_TOKEN: ${GRPC_AUTH_TOKEN:-}
  volumes:
  - ${HYBRAG_DOCREADER_PATH:-/data/vos_workspace/hybrag/docreader}:/tmp/docreader
  healthcheck:
    test: ["CMD", "grpc_health_probe", "-addr=localhost:50051"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s

