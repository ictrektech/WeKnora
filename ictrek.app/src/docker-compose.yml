  hybrag-neo4j-amd-with-cuda:
    <<: *hybrag-neo4j-base
    profiles: ["amd"]
    image: ${NEO4J_AMD_IMAGE}
    pull_policy: always

  hybrag-redis-amd-no-cuda:
    <<: *hybrag-redis-base
