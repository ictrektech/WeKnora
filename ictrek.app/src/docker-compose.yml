x-hybrag-app-base: &hybrag-app-base
  restart: unless-stopped
  networks:
    vos_default:
      aliases:
      - hybrag-app
  environment: *hybrag-app-env
  volumes:
  - ${HYBRAG_FILES_PATH:-/data/vos_workspace/hybrag/files}:/data/files
  - ${HYBRAG_DOCREADER_PATH:-/data/vos_workspace/hybrag/docreader}:/tmp/docreader:ro
  - ${HYBRAG_DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s

x-hybrag-redis-base: &hybrag-redis-base
  command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-hybrag-redis}
  volumes:
  - ${HYBRAG_REDIS_PATH:-/data/vos_workspace/hybrag/redis}:/data
  networks:
    vos_default:
      aliases:
      - hybrag-redis
  restart: unless-stopped

x-hybrag-neo4j-base: &hybrag-neo4j-base
  ports:
  - "${NEO4J_HTTP_PORT:-27474}:7474"
  - "${NEO4J_BOLT_PORT:-27687}:7687"
  environment:
    NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-hybrag-neo4j}
    NEO4J_apoc_export_file_enabled: "true"
    NEO4J_apoc_import_file_enabled: "true"
    NEO4J_apoc_import_file_use__neo4j__config: "true"
    NEO4JLABS_PLUGINS: '["apoc"]'
  volumes:
  - ${HYBRAG_NEO4J_PATH:-/data/vos_workspace/hybrag/neo4j}:/data
  networks:
    vos_default:
      aliases:
      - hybrag-neo4j
      - neo4j
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "auth=\"$${NEO4J_AUTH:-neo4j/hybrag-neo4j}\"; cypher-shell -u \"$${auth%%/*}\" -p \"$${auth#*/}\"\
        \ 'RETURN 1;' >/dev/null 2>&1"]
    interval: 30s
    timeout: 10s
    retries: 10
    start_period: 90s

services:
  hybrag-redis-amd-with-cuda:
