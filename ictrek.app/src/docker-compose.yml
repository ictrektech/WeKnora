x-hybrag-app-base: &hybrag-app-base
  restart: unless-stopped
  networks:
    vos_default:
      aliases:
        - hybrag-app
  environment: *hybrag-app-env
  volumes:
    - ${HYBRAG_FILES_PATH:-/data/vos_workspace/hybrag/files}:/data/files
    - ${HYBRAG_DOCREADER_PATH:-/data/vos_workspace/hybrag/docreader}:/tmp/docreader:ro
    - ${HYBRAG_DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s

services:
  hybrag-redis:
    image: docker.io/library/redis:7.0-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-hybrag-redis}
    volumes:
      - ${HYBRAG_REDIS_PATH:-/data/vos_workspace/hybrag/redis}:/data
    networks:
      - vos_default
    restart: unless-stopped

  hybrag-frontend-amd-with-cuda:
    <<: *hybrag-frontend-base
    profiles: ["amd"]
    image: ${WEKNORA_UI_AMD_IMAGE}
    pull_policy: always
    depends_on:
      hybrag-app-amd-with-cuda:
        condition: service_started

  hybrag-app-amd-with-cuda:
