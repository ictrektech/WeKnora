services:
  hybrag-redis:
    image: docker.io/library/redis:7.0-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-hybrag-redis}
    volumes:
      - ${HYBRAG_REDIS_PATH:-/data/vos_workspace/hybrag/redis}:/data
    networks:
      - vos_default
    restart: unless-stopped

  hybrag-frontend-amd-with-cuda:
    <<: *hybrag-frontend-base
    profiles: ["amd"]
    image: ${WEKNORA_UI_AMD_IMAGE}
    pull_policy: always
    depends_on:
      hybrag-app-amd-with-cuda:
        condition: service_healthy

  hybrag-app-amd-with-cuda:
    <<: *hybrag-app-base
    profiles: ["amd"]
    image: ${WEKNORA_APP_AMD_IMAGE}
    pull_policy: always
    environment:
      <<: *hybrag-app-env
      WEKNORA_SANDBOX_DOCKER_IMAGE: ${WEKNORA_SANDBOX_AMD_IMAGE}
    depends_on:
      hybrag-redis:
        condition: service_started
      hybrag-docreader-amd-with-cuda:
        condition: service_healthy
      hybrag-ollama-qa-amd-with-cuda:
        condition: service_healthy
      hybrag-ollama-embedding-amd-with-cuda:
        condition: service_healthy

  hybrag-docreader-amd-with-cuda:
    <<: *hybrag-docreader-base
    profiles: ["amd"]
    image: ${WEKNORA_DOCREADER_AMD_IMAGE}
    pull_policy: always

  hybrag-ollama-qa-amd-with-cuda:
    <<: *hybrag-ollama-qa-base
    profiles: ["amd"]
    image: ${OLLAMA_SERVER_AMD_IMAGE}
    pull_policy: always

  hybrag-ollama-embedding-amd-with-cuda:
