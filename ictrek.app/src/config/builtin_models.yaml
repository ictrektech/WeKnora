# HybRAG VOS default model rows.
#
# These rows are mounted by the VOS package, not baked into the image. They
# distinguish the two Ollama containers in the UI:
# - hybrag-ollama-qa provides chat and VLM.
# - hybrag-ollama-embedding provides embeddings.

builtin_models:
  - id: hybrag-ollama-qwen35-2b-qa
    type: KnowledgeQA
    source: remote
    is_default: true
    name: ${OLLAMA_QA_MODEL}
    display_name: HybRAG Ollama QA (hybrag-ollama-qa)
    parameters:
      base_url: http://hybrag-ollama-qa:11535/v1
      api_key: EMPTY
      provider: generic
      supports_vision: true
      extra_config:
        thinking_control: think

  - id: hybrag-ollama-qwen35-2b-vlm
    type: VLLM
    source: remote
    is_default: true
    name: ${OLLAMA_QA_MODEL}
    display_name: HybRAG Ollama VLM (hybrag-ollama-qa)
    parameters:
      base_url: http://hybrag-ollama-qa:11535/v1
      api_key: EMPTY
      provider: generic
      supports_vision: true
      extra_config:
        thinking_control: think

  - id: hybrag-ollama-bge-m3-embedding
    type: Embedding
    source: remote
    is_default: true
    name: ${OLLAMA_EMBEDDING_MODEL}
    display_name: HybRAG Ollama Embedding (hybrag-ollama-embedding)
    parameters:
      base_url: http://hybrag-ollama-embedding:11535/v1
      api_key: EMPTY
      provider: generic
      embedding_parameters:
        dimension: 1024
        truncate_prompt_tokens: 8192
        supports_dimension_override: false
