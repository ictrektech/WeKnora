# Orin NX / L4T 纯 Ollama 部署 overlay。
# Ollama 同时提供 QA/VLM 和 Embedding，但拆成两个容器隔离并发。
# 和基础 docker-compose.yml 一起使用：
#
#   docker compose --env-file .env \
#     -f docker-compose.yml \
#     -f docker-compose.orin-ollama.yml up -d

services:
  app:
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama-qa:11434}
      SSRF_WHITELIST_EXTRA: ${SSRF_WHITELIST_EXTRA:-ollama-qa,ollama-embedding,host.docker.internal,searxng,qdrant,milvus,weaviate,doris-fe}
      BATCH_EMBED_SIZE: ${BATCH_EMBED_SIZE:-4}
      CONCURRENCY_POOL_SIZE: ${CONCURRENCY_POOL_SIZE:-1}
      WEKNORA_MAIN_QA_MODEL_CONCURRENCY: ${WEKNORA_MAIN_QA_MODEL_CONCURRENCY:-3}
      WEKNORA_CHAT_RESERVED_CONCURRENCY: ${WEKNORA_CHAT_RESERVED_CONCURRENCY:-2}
      WEKNORA_GRAPH_LLM_CONCURRENCY: ${WEKNORA_GRAPH_LLM_CONCURRENCY:-1}
      WEKNORA_ASYNQ_CONCURRENCY: ${WEKNORA_ASYNQ_CONCURRENCY:-1}
      WEKNORA_WIKI_INGEST_MAP_PARALLEL: ${WEKNORA_WIKI_INGEST_MAP_PARALLEL:-1}
      WEKNORA_WIKI_INGEST_REDUCE_PARALLEL: ${WEKNORA_WIKI_INGEST_REDUCE_PARALLEL:-1}
    depends_on:
      ollama-qa:
        condition: service_healthy
      ollama-embedding:
        condition: service_healthy

  ollama-qa:
    image: ${OLLAMA_SERVER_IMAGE:?set OLLAMA_SERVER_IMAGE in .env}
    ports:
      - "${OLLAMA_QA_HOST_PORT:-21434}:11434"
      - "${OLLAMA_QA_GATEWAY_HOST_PORT:-21535}:11535"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_QA_NUM_PARALLEL:-3}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-18000}
    volumes:
      - ${OLLAMA_QA_MODELS_DIR:-./data/ollama-qa}:/root/.ollama
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - ollama serve >/tmp/ollama.log 2>&1 & exec uvicorn ollama_gateway.gateway:app --host 0.0.0.0 --port 11535
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - weknora
    restart: unless-stopped

  ollama-embedding:
    image: ${OLLAMA_SERVER_IMAGE:?set OLLAMA_SERVER_IMAGE in .env}
    ports:
      - "${OLLAMA_EMBEDDING_HOST_PORT:-21435}:11434"
      - "${OLLAMA_EMBEDDING_GATEWAY_HOST_PORT:-21536}:11535"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_EMBEDDING_NUM_PARALLEL:-4}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_EMBEDDING_CONTEXT_LENGTH:-8192}
    volumes:
      - ${OLLAMA_EMBEDDING_MODELS_DIR:-./data/ollama-embedding}:/root/.ollama
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - ollama serve >/tmp/ollama.log 2>&1 & exec uvicorn ollama_gateway.gateway:app --host 0.0.0.0 --port 11535
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - weknora
    restart: unless-stopped
