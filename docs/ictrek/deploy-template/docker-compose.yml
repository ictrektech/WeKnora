name: ${COMPOSE_PROJECT_NAME:-weknora-ictrek}

services:
  frontend:
    image: ${WEKNORA_UI_IMAGE:?set WEKNORA_UI_IMAGE in .env}
    ports:
      - "${FRONTEND_PORT:-30080}:80"
    environment:
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-500}
      APP_HOST: app
      APP_PORT: 8080
      APP_SCHEME: http
    depends_on:
      app:
        condition: service_healthy
    networks:
      - weknora
    restart: unless-stopped

  app:
    image: ${WEKNORA_APP_IMAGE:?set WEKNORA_APP_IMAGE in .env}
    ports:
      - "${APP_PORT:-30081}:8080"
    env_file:
      - .env
    environment:
      GIN_MODE: ${GIN_MODE:-release}
      TZ: ${TZ:-Asia/Shanghai}
      WEKNORA_LANGUAGE: ${WEKNORA_LANGUAGE:-zh-CN}
      DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:?set DB_USER in .env}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:?set DB_NAME in .env}
      RETRIEVE_DRIVER: ${RETRIEVE_DRIVER:-postgres}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      LOCAL_STORAGE_BASE_DIR: ${LOCAL_STORAGE_BASE_DIR:-/data/files}
      STREAM_MANAGER_TYPE: ${STREAM_MANAGER_TYPE:-redis}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PREFIX: ${REDIS_PREFIX:-stream:}
      DOCREADER_ADDR: docreader:50051
      DOCREADER_TRANSPORT: grpc
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      SSRF_WHITELIST: ${SSRF_WHITELIST:-}
      SSRF_WHITELIST_EXTRA: ${SSRF_WHITELIST_EXTRA:-host.docker.internal,searxng,qdrant,milvus,weaviate,doris-fe}
      ENABLE_GRAPH_RAG: ${ENABLE_GRAPH_RAG:-false}
      NEO4J_ENABLE: ${NEO4J_ENABLE:-false}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
      CONCURRENCY_POOL_SIZE: ${CONCURRENCY_POOL_SIZE:-4}
      WEKNORA_ASYNQ_CONCURRENCY: ${WEKNORA_ASYNQ_CONCURRENCY:-2}
      WEKNORA_MAIN_QA_MODEL_CONCURRENCY: ${WEKNORA_MAIN_QA_MODEL_CONCURRENCY:-4}
      WEKNORA_CHAT_RESERVED_CONCURRENCY: ${WEKNORA_CHAT_RESERVED_CONCURRENCY:-2}
      WEKNORA_GRAPH_LLM_CONCURRENCY: ${WEKNORA_GRAPH_LLM_CONCURRENCY:-2}
      WEKNORA_WIKI_INGEST_MAP_PARALLEL: ${WEKNORA_WIKI_INGEST_MAP_PARALLEL:-2}
      WEKNORA_WIKI_INGEST_REDUCE_PARALLEL: ${WEKNORA_WIKI_INGEST_REDUCE_PARALLEL:-2}
      WEKNORA_ASYNQ_QUEUE_CRITICAL: ${WEKNORA_ASYNQ_QUEUE_CRITICAL:-10}
      WEKNORA_ASYNQ_QUEUE_PARSE: ${WEKNORA_ASYNQ_QUEUE_PARSE:-5}
      WEKNORA_ASYNQ_QUEUE_DEFAULT: ${WEKNORA_ASYNQ_QUEUE_DEFAULT:-4}
      WEKNORA_ASYNQ_QUEUE_LOW: ${WEKNORA_ASYNQ_QUEUE_LOW:-1}
      WEKNORA_ASYNQ_QUEUE_MULTIMODAL: ${WEKNORA_ASYNQ_QUEUE_MULTIMODAL:-3}
      WEKNORA_ASYNQ_QUEUE_GRAPH: ${WEKNORA_ASYNQ_QUEUE_GRAPH:-1}
      WEKNORA_ASYNQ_QUEUE_QUESTION: ${WEKNORA_ASYNQ_QUEUE_QUESTION:-2}
      WEKNORA_REPARSE_INCOMPLETE_ON_START: ${WEKNORA_REPARSE_INCOMPLETE_ON_START:-true}
      WEKNORA_REPARSE_WAIT_URLS: ${WEKNORA_REPARSE_WAIT_URLS:-}
      WEKNORA_REPARSE_READY_WAIT_SECONDS: ${WEKNORA_REPARSE_READY_WAIT_SECONDS:-300}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-false}
      JWT_SECRET: ${JWT_SECRET:-}
      TENANT_AES_KEY: ${TENANT_AES_KEY:-}
      SYSTEM_AES_KEY: ${SYSTEM_AES_KEY:-}
      CRYPTO_MASTER_KEY: ${CRYPTO_MASTER_KEY:-}
      CRYPTO_SALT: ${CRYPTO_SALT:-}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-500}
      WEKNORA_BOOTSTRAP_SYSTEM_ADMIN_EMAIL: ${WEKNORA_BOOTSTRAP_SYSTEM_ADMIN_EMAIL:-}
    volumes:
      - ./data/files:/data/files
      - ./data/docreader:/tmp/docreader:ro
      # Uncomment only when this deployment intentionally uses YAML-managed models.
      # - ./config/builtin_models.yaml:/app/config/builtin_models.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      docreader:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - weknora
    restart: unless-stopped

  docreader:
    image: ${WEKNORA_DOCREADER_IMAGE:?set WEKNORA_DOCREADER_IMAGE in .env}
    expose:
      - "50051"
    environment:
      DOCREADER_IMAGE_OUTPUT_DIR: /tmp/docreader
      DOCREADER_PDF_FORCE_SCANNED: ${DOCREADER_PDF_FORCE_SCANNED:-false}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-500}
      DOCREADER_ODL_MAX_WORKERS: ${DOCREADER_ODL_MAX_WORKERS:-1}
      DOCREADER_ODL_HYBRID: ${DOCREADER_ODL_HYBRID:-off}
      DOCREADER_MARKITDOWN_MAX_WORKERS: ${DOCREADER_MARKITDOWN_MAX_WORKERS:-1}
      DOCREADER_PDF_RENDER_MAX_WORKERS: ${DOCREADER_PDF_RENDER_MAX_WORKERS:-1}
      DOCREADER_PDF_RENDER_DPI: ${DOCREADER_PDF_RENDER_DPI:-200}
      DOCREADER_PDF_JPEG_QUALITY: ${DOCREADER_PDF_JPEG_QUALITY:-90}
      GRPC_TLS_ENABLED: ${GRPC_TLS_ENABLED:-false}
      GRPC_AUTH_TOKEN: ${GRPC_AUTH_TOKEN:-}
    volumes:
      - ./data/docreader:/tmp/docreader
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - weknora
    restart: unless-stopped

  postgres:
    image: paradedb/paradedb:v0.22.2-pg17
    environment:
      POSTGRES_USER: ${DB_USER:?set DB_USER in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:?set DB_NAME in .env}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - weknora
    restart: unless-stopped
    stop_grace_period: 1m

  redis:
    image: redis:7.0-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    volumes:
      - ./data/redis:/data
    networks:
      - weknora
    restart: unless-stopped

  neo4j:
    image: neo4j:2025.10.1
    profiles:
      - neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-17474}:7474"
      - "${NEO4J_BOLT_PORT:-17687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      NEO4JLABS_PLUGINS: '["apoc"]'
    volumes:
      - ./data/neo4j:/data
    networks:
      - weknora
    restart: unless-stopped

networks:
  weknora:
