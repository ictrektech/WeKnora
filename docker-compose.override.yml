services:
  app:
    environment:
      SSRF_WHITELIST_EXTRA: ${SSRF_WHITELIST_EXTRA:-host.docker.internal,searxng,qdrant,milvus,weaviate,doris-fe}
    volumes:
      - ./data/files:/data/files
      - ./config/builtin_models.yaml:/app/config/builtin_models.yaml:ro
  postgres:
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
  redis:
    volumes:
      - ./data/redis:/data
